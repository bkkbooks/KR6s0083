body:
  text: 大秦寺僧景淨述粵若常然真寂先先而無元窅然靈虛後後而妙有總玄摳而造化妙衆聖以元尊者其唯我三一妙身無元真主阿羅訶歟判十字以定四方鼓元風而生二氣暗空易而天地開日月運而晝夜作匠成萬物然立初人別賜良和令鎮化海渾元之性虛而不盈素蕩之心本無希嗜洎乎娑殫施妄鈿飾純精間平大於此是之中隙冥同於彼非之內是以三百六十五種肩隨結轍競織法羅或指物以託宗或空有以淪二或禱祀以邀福或伐善以矯人智慮營營恩情役役茫然無得煎迫轉燒積昧亡途久迷休復於是我三一分身景尊彌施訶戢隱真威同人出代神天宣慶室女誕聖於大秦景宿告祥波斯覩耀以來貢圓二十四聖有説之舊法理家國於大猷設三一淨風無言之新教陶良用於正信制八境之度鍊塵成真啓三常之門開生滅死懸景日以破暗府魔妄於是乎悉摧棹慈航以登明宮含靈於是乎既濟能事斯畢亭午升真經留二十七部張元化以發靈關法浴水風滌浮華而潔虛白印持十字融四照以合無拘擊木震仁惠之音東禮趣生榮之路存鬚所以有外行削頂所以無內情不畜臧獲均貴賤於人不聚貨財示罄遺於我齋以伏識而成戒以靜慎為固七時禮讚大庇存亡七日一薦洗心反素真常之道妙而難名功用昭彰強稱景教惟道非聖不弘聖非道不大道聖符契天下文明太宗文皇帝光華啓運明聖臨人大秦國有上德曰阿羅本占青雲而載真經望風律以馳艱險貞觀九祀至於長安帝使宰臣房公玄齡總仗西郊賓迎入內翻經書殿問道禁闈深知正真特令傳授貞觀十有二年秋七月詔曰道無常名聖無常體隨方設教密濟群生大秦國大德阿羅本遠將經像來獻上京詳其教旨玄妙無為觀其元宗生成立要詞無繁説理有忘筌濟物利人宜行天下所司即於京義寧坊造大秦寺一所度僧二十一人宗周德𬽐青駕西升巨唐道光景風東扇旋令有司將帝寫真轉摸寺壁天姿泛彩英朗景門聖迹騰祥永輝法界案西域圖記及漢魏史策大秦國南統珊瑚之海北極衆寶之山西望仙境花林東接長風弱水其土出火浣布返魂香明月珠夜光璧俗無寇盜人有樂康法非景不行主非德不立土宇廣濶文物昌明高宗大帝克恭纘祖潤色真宗而於諸州各置景寺仍崇阿羅本為鎮國大法主法流十道國富元休寺滿百城家殷景福聖曆年釋子用壯騰口於東周先天末下士大笑訕謗於西鎬有若僧首羅含大德及烈並金方貴緒物外高僧共振玄網俱維絶紐玄宗至道皇帝令寧國等五王親臨福宇建立壇場法棟暫橈而更崇道石時傾而復正天寶初令大將軍高力士送五聖寫真寺內安置賜絹百匹奉慶睿圖龍髯雖遠弓劍可攀日角舒光天顏咫尺三載大秦國有僧佶和瞻星向化望日朝尊詔僧羅含僧普論等一七人與大德佶和於興慶宮修功德於是天題寺榜額戴龍書寶裝璀翠灼爍丹霞睿扎宏空騰淩激曰寵賚比南山峻極沛澤與東海齊深道無不可所可可名聖無不作所作可述肅宗文明皇帝於靈武等五郡重立景寺元善資而福祚開大慶臨而皇業建代宗文武皇帝恢張聖運從事無為每於降誕之辰錫天香以告成功頒御饌以光景衆且乾以美利故能廣生聖以體元故能亭毒我建中聖神文武皇帝披八政以黜陟幽明闡九疇以惟新景命化通玄理祝無愧心至於方大而虛專靜而恕廣慈救衆苦善貸被群生者我修行之大猷汲引之階漸也若使風雨時天下靜人能理物能清存能昌歿能樂念生響應情發目誠者我景力能事之功用也大施主金紫光祿大夫同朔方節度副使試殿中監賜紫袈裟僧伊斯和而好惠聞道勤行遠自王舍之城聿來中夏術高三代藝博十全始效節於丹庭乃策名於王帳中書令汾陽郡王郭公子儀初總戎於朔方也肅宗俾之從邁雖見親於臥內不自異於行間為公爪牙作軍耳目能散祿賜不積於家獻臨恩之頗黎布辭憩之金罽或仍其舊寺或重廣法堂崇飾廊宇如翬斯飛更效景門依仁施利每歲集四寺僧徒虔事精供備諸五旬餧者來而飯之寒者來而衣之病者療而起之死者葬而安之清節達娑未聞斯美白衣景士今見其人願刻洪碑以揚休烈詞曰真主無元湛寂常然權輿匠化起地立天分身出代救度無邊日升暗滅咸證真玄赫赫文皇道冠前王乘時撥亂乾廓坤張明明景教言歸我唐翻經建寺存歿舟航百福偕作萬邦之康高宗纂祖更築精宇和宮敞朗遍滿中土真道宣明式封法主人有樂康物無災苦玄宗啓聖克修真正御榜揚輝天書蔚映皇圖璀璨率土高敬庶績咸熙人賴其慶肅宗來復天威引駕聖日舒晶祥風掃夜祚歸皇室祅氛永謝止沸定塵造我區夏代宗孝義德合天地開貸生成物資美利香以報功仁以作施暘谷來威月窟畢萃建中統極聿修明德武肅四溟文清萬域燭臨人隱鏡觀物色六合昭蘇百蠻取則道惟廣兮應惟密強名言兮演三一主能作兮臣能述建豐碑兮頌元吉大唐建中二年歲在作噩太蔟月七日大耀森文曰建立時法主僧寧恕知東方之景衆也朝議郎前行台州司士參軍呂秀巖書助撿挍試太常卿賜紫袈裟寺主僧業利撿挍建立碑僧行通僧靈寶僧內澄僧光正僧和明僧立本僧法源僧審慎僧寶靈僧玄覽僧景通老宿耶俱摩僧明一僧保國僧志堅僧義濟僧玄德僧利用僧元僧奉真僧至德僧和光僧景福僧太和僧崇德僧德建僧去甚僧廣德僧福壽僧僧寶達僧明僧和吉僧僧遙僧日進輪僧和僧崇敬僧惠通僧居信僧文貞僧文明僧昭德僧曜原僧仁僧玄真僧明泰僧利僧敬德僧元僧乾僧守一僧光僧聞順僧普濟僧凝僧沖和僧英德僧靈德僧靈壽僧還淳敬真後一千七十九年咸豐己未武林韓泰華來觀幸字畫完整重造碑亭覆焉惜故友吳子苾方伯不及同遊也為悵然久之
